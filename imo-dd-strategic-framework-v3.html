<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IMO Digital &amp; Data — Strategic Enablement Framework</title>
<style>
  /* ------------------------------------------------------------------
     MARS CENTRA
     Drop the Mars Centra .woff2 files into your Site Assets library
     (e.g. /sites/IMODigitalData/SiteAssets/fonts/) and keep this file in
     the same library so the relative paths resolve — or replace the src
     URLs below with full server-relative paths. Falls back to Poppins /
     Segoe UI if the files can't be reached.
     ------------------------------------------------------------------ */
  @font-face{
    font-family:"Mars Centra";
    src:url("fonts/MarsCentra-Book.woff2") format("woff2");
    font-weight:400; font-style:normal; font-display:swap;
  }
  @font-face{
    font-family:"Mars Centra";
    src:url("fonts/MarsCentra-Medium.woff2") format("woff2");
    font-weight:500; font-style:normal; font-display:swap;
  }
  @font-face{
    font-family:"Mars Centra";
    src:url("fonts/MarsCentra-Bold.woff2") format("woff2");
    font-weight:700; font-style:normal; font-display:swap;
  }
  @font-face{
    font-family:"Mars Centra";
    src:url("fonts/MarsCentra-ExtraBold.woff2") format("woff2");
    font-weight:800; font-style:normal; font-display:swap;
  }

  :root{
    --navy:#000096;
    --red:#FF0F49;
    --red-tint:#FFE7ED;
    --cyan:#00A0DF;
    --cyan-tint:#E1F3FC;
    --orange:#FF8200;
    --orange-tint:#FFF0DC;
    --violet:#7B76D2;
    --violet-tint:#ECEBF8;
    --ink:#1A1A2E;
    --muted:#6B6B7B;
    --radius:18px;
    --font:"Mars Centra","MarsCentra","Poppins","Segoe UI",-apple-system,BlinkMacSystemFont,Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    padding:24px 22px 32px;
    font-family:var(--font);
    color:var(--ink);
    background:#FFFFFF;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1240px;margin:0 auto}

  .hint{
    font-size:13px;color:var(--muted);margin:0 0 14px;
    display:flex;align-items:center;gap:8px;
  }
  .hint svg{flex:none}

  .section-label{
    font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
    color:var(--navy);margin:34px 0 12px;
  }

  /* ---------- Pillars ---------- */
  .pillars{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;align-items:start}
  .pillar{
    border-radius:var(--radius);
    padding:24px 20px 20px;
    background:var(--tint);
    display:flex;flex-direction:column;gap:12px;
  }
  .icon{
    width:56px;height:56px;border-radius:50%;background:var(--accent);
    display:grid;place-items:center;flex:none;
  }
  .icon svg{width:28px;height:28px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .pillar h2{
    font-size:21px;line-height:1.25;font-weight:800;margin:0;
    color:var(--accent);letter-spacing:-.01em;
  }
  .pillar p{font-size:14px;line-height:1.5;margin:0;color:var(--ink)}

  .reveal{
    margin-top:auto;padding-top:8px;width:100%;
    display:flex;align-items:center;justify-content:center;gap:8px;
    background:var(--accent);color:#fff;border:0;border-radius:999px;
    padding:13px 16px;font-family:inherit;font-size:14px;font-weight:700;
    cursor:pointer;transition:filter .15s ease;
  }
  .reveal:hover{filter:brightness(1.08)}
  .reveal:focus-visible{outline:3px solid var(--navy);outline-offset:3px}
  .chev{width:14px;height:14px;transition:transform .2s ease}
  .reveal[aria-expanded="true"] .chev{transform:rotate(180deg)}

  .outcomes{
    display:none;background:#fff;border-radius:14px;padding:16px 18px;
    border:2px solid var(--accent);
  }
  .outcomes.open{display:block;animation:fade .2s ease}
  @keyframes fade{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:none}}
  .outcomes .cap{
    font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
    color:var(--muted);margin-bottom:6px;
  }
  .outcomes .val{font-size:15px;font-weight:700;line-height:1.45;color:var(--accent)}

  /* ---------- Enablers ---------- */
  .enablers{
    background:#F2F2F5;border-radius:var(--radius);padding:16px;
    display:flex;flex-wrap:wrap;gap:12px;
  }
  .enabler{
    flex:1 1 180px;text-align:center;background:var(--navy);color:#fff;
    border-radius:999px;padding:14px 18px;font-size:15px;font-weight:700;
  }

  @media (max-width:980px){
    .pillars{grid-template-columns:repeat(2,1fr)}
  }
  @media (max-width:620px){
    body{padding:18px 14px 26px}
    .pillars{grid-template-columns:1fr}
  }
  @media (prefers-reduced-motion:reduce){
    *{transition:none !important;animation:none !important}
  }
</style>
</head>
<body>
<div class="wrap">

  <p class="hint">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#6B6B7B" stroke-width="2" stroke-linecap="round"><path d="M6 9l6 6 6-6"/></svg>
    Select a pillar to reveal its business outcomes.
  </p>

  <div class="pillars" id="pillars"></div>

  <p class="section-label">Critical enablers</p>
  <div class="enablers" id="enablers"></div>

</div>

<script>
const PILLARS = [
  {
    title:"IMO Digital &amp; Data Delivery",
    accent:"var(--red)", tint:"var(--red-tint)",
    desc:"Run the digital, data &amp; technology integration roadmap across Mars Snacking.",
    outcomes:"Growth · Synergies",
    banner:"Deliver the integration",
    icon:'<circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4"/><path d="M12 12l7-7M15 5h4v4"/>'
  },
  {
    title:"Digital Technologies Value &amp; Synergies",
    accent:"var(--cyan)", tint:"var(--cyan-tint)",
    desc:"Maximize value through synergy delivery, simplification &amp; technology optimization.",
    outcomes:"$115M digital synergies · lower total cost of ownership",
    banner:"Capture the value",
    icon:'<path d="M3 17l6-6 4 4 8-8"/><path d="M15 7h6v6"/>'
  },
  {
    title:"Digital Delivery Model",
    accent:"var(--orange)", tint:"var(--orange-tint)",
    desc:"Build a scalable, standard model for delivering work via products &amp; platforms.",
    outcomes:"Speed to market · predictability · quality on digital solutions",
    banner:"Standardize how we work",
    icon:'<path d="M6.5 9a3.5 3.5 0 1 0 0 6c2.5 0 3.5-2 5.5-3s3-3 5.5-3a3.5 3.5 0 1 1 0 6c-2.5 0-3.5-2-5.5-3S9 9 6.5 9z"/>'
  },
  {
    title:"Future Digital Technology OD",
    accent:"var(--violet)", tint:"var(--violet-tint)",
    desc:"Design the future Digital &amp; Data organization, capabilities &amp; operating model.",
    outcomes:"Combined future DT organization",
    banner:"Build the future",
    icon:'<circle cx="9" cy="8" r="3"/><circle cx="17" cy="9" r="2.3"/><path d="M3.5 19a5.5 5.5 0 0 1 11 0M15.5 19a4 4 0 0 1 5 0"/>'
  }
];

const ENABLERS = [
  "Analytics &amp; Reporting",
  "Change Experience",
  "Data Foundations",
  "Enterprise Architecture",
  "Service Management"
];

const CHEV = '<svg class="chev" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"><path d="M6 9l6 6 6-6"/></svg>';

const pillarsEl = document.getElementById("pillars");
PILLARS.forEach((p, i) => {
  const card = document.createElement("div");
  card.className = "pillar";
  card.style.setProperty("--accent", p.accent);
  card.style.setProperty("--tint", p.tint);
  card.innerHTML = `
    <span class="icon"><svg viewBox="0 0 24 24">${p.icon}</svg></span>
    <h2>${p.title}</h2>
    <p>${p.desc}</p>
    <button class="reveal" type="button" aria-expanded="false" aria-controls="out-${i}">
      ${p.banner} ${CHEV}
    </button>
    <div class="outcomes" id="out-${i}">
      <div class="cap">Business outcomes</div>
      <div class="val">${p.outcomes}</div>
    </div>`;

  const btn = card.querySelector(".reveal");
  const out = card.querySelector(".outcomes");
  btn.addEventListener("click", () => {
    const open = out.classList.toggle("open");
    btn.setAttribute("aria-expanded", open ? "true" : "false");
  });
  pillarsEl.appendChild(card);
});

const enablersEl = document.getElementById("enablers");
ENABLERS.forEach(name => {
  const e = document.createElement("div");
  e.className = "enabler";
  e.innerHTML = name;
  enablersEl.appendChild(e);
});
</script>
</body>
</html>
